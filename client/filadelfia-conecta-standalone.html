<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#174b3a">
  <title>Filadélia Conecta</title>
  <style>
    :root{--bg:#faf7ed;--fg:#17382d;--card:#fffef9;--primary:#176044;--deep:#123c2e;--soft:#e1f0e5;--gold:#b7822d;--gold-soft:#f7ecd1;--muted:#667a71;--line:#d9e1da;--danger:#b72d35;--shadow:0 18px 50px rgba(18,60,46,.13);--radius:18px}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-width:320px;background:var(--bg);color:var(--fg);font:16px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit}button,a{tap-highlight-color:transparent}.hidden{display:none!important}
    .gradient{background:linear-gradient(145deg,var(--deep),var(--primary) 58%,#3e795e);color:#fff}.shell{min-height:100vh;padding-bottom:88px}.wrap{width:min(100%,760px);margin:auto}.header{padding:28px 20px 30px;border-radius:0 0 32px 32px}.brand{display:flex;align-items:center;gap:12px}.logo{display:grid;place-items:center;width:46px;height:46px;border:3px solid rgba(255,255,255,.35);border-radius:50%;background:#f9f5df;color:var(--primary);font-family:Georgia,serif;font-size:25px;font-weight:800}.brand small{display:block;font-size:9px;letter-spacing:.18em;opacity:.7}.brand strong,h1,h2,h3{font-family:Georgia,"Times New Roman",serif}.brand strong{font-size:21px}.topline{display:flex;align-items:center;justify-content:space-between}.greeting{margin:26px 0 0}.greeting p{margin:0;opacity:.7}.greeting h1{margin:2px 0 0;font-size:30px}.content{padding:20px 16px}.hero{padding:20px;border-radius:26px;background:var(--deep);color:#fff;box-shadow:var(--shadow)}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;opacity:.7}.hero-row{display:flex;gap:14px;align-items:end;justify-content:space-between}.hero h2{margin:10px 0 3px;font-size:25px;line-height:1.15}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.quick{min-height:120px;display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;padding:16px;background:var(--card);border:1px solid var(--line);border-radius:20px;color:var(--fg);box-shadow:0 4px 14px rgba(18,60,46,.05);text-align:left;font-weight:750}.quick .ico{display:grid;place-items:center;width:43px;height:43px;border-radius:13px;background:var(--soft);font-size:21px}.quick:nth-child(even) .ico{background:var(--gold-soft)}.section-title{margin:24px 0 10px;color:var(--muted);font-size:11px;font-family:inherit;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
    .btn{display:inline-flex;min-height:44px;align-items:center;justify-content:center;gap:8px;padding:10px 15px;border:0;border-radius:13px;background:var(--primary);color:#fff;font-weight:750;cursor:pointer;text-decoration:none}.btn.secondary{background:var(--gold-soft);color:#674816}.btn.outline{border:1px solid var(--line);background:var(--card);color:var(--fg)}.btn.ghost{background:transparent;color:inherit}.btn.danger{background:var(--danger)}.iconbtn{width:44px;padding:0}.full{width:100%}.small{min-height:36px;padding:7px 11px;font-size:13px}
    .card{padding:17px;border:1px solid var(--line);border-radius:20px;background:var(--card);box-shadow:0 3px 12px rgba(18,60,46,.04)}.stack{display:grid;gap:12px}.row{display:flex;align-items:center;gap:13px}.grow{flex:1;min-width:0}.muted{color:var(--muted)}.tiny{font-size:12px}.badge{display:inline-flex;padding:4px 9px;border-radius:99px;background:var(--gold-soft);color:#674816;font-size:11px;font-weight:800}.time{display:grid;place-items:center;width:58px;height:58px;flex:none;border-radius:17px;background:var(--soft);color:var(--primary);font-weight:800}.view-head{padding:25px 20px 30px}.view-head h1{margin:22px 0 2px;font-size:35px}.back{padding:0;color:#fff;background:none;border:0;font-weight:700;cursor:pointer}.field{display:grid;gap:7px}.field label{font-size:13px;font-weight:750}.field input,.field textarea,.field select{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--fg)}.field textarea{min-height:110px;resize:vertical}.form{display:grid;gap:15px}.notice{padding:14px;border-radius:15px;background:var(--soft);font-size:13px}.warning{background:var(--gold-soft)}
    .nav{position:fixed;z-index:5;inset:auto 0 0;margin:auto;width:min(100%,760px);display:grid;grid-template-columns:repeat(5,1fr);padding:7px 5px max(7px,env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(255,254,249,.96);backdrop-filter:blur(14px)}.nav button{display:grid;gap:2px;place-items:center;height:58px;border:0;background:none;color:var(--muted);font-size:10px;cursor:pointer}.nav button span:first-child{font-size:20px}.nav button.active{color:var(--primary);font-weight:800}
    .auth{min-height:100vh;background:radial-gradient(rgba(23,56,45,.04) .7px,transparent .7px);background-size:7px 7px}.auth-top{padding:46px 24px 62px;border-radius:0 0 40px 40px}.auth-top h1{max-width:420px;margin:42px auto 10px;font-size:38px;line-height:1.08}.auth-top p{max-width:420px;margin:auto;opacity:.72}.auth .brand{max-width:420px;margin:auto}.auth-card{width:min(calc(100% - 32px),430px);margin:-30px auto 30px;padding:20px;border:1px solid var(--line);border-radius:26px;background:var(--card);box-shadow:var(--shadow)}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:4px;border-radius:13px;background:#edf0eb}.tabs button{padding:9px;border:0;border-radius:10px;background:none;font-weight:700}.tabs .active{background:var(--primary);color:#fff}.admin-toggle{width:100%;margin-top:12px;border:0;background:none;color:var(--primary);font-weight:800;cursor:pointer}.auth-note{text-align:center;font-size:11px;color:var(--muted)}
    .gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.photo{overflow:hidden;padding:0}.photo img{display:block;width:100%;aspect-ratio:1;object-fit:cover}.photo figcaption{padding:12px}.thumb{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--soft)}.avatar{display:grid;place-items:center;width:55px;height:55px;border-radius:50%;background:var(--gold-soft);font-size:24px}.admin-only{display:none}.admin .admin-only{display:inline-flex}.admin-edit{position:fixed;right:16px;bottom:95px;z-index:4}.empty{text-align:center;padding:25px;color:var(--muted)}
    @media(min-width:650px){.grid{grid-template-columns:repeat(3,1fr)}.gallery{grid-template-columns:repeat(3,1fr)}.content{padding:25px 20px}.auth-top h1{font-size:44px}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
  (()=>{
    const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const store={get(k,d){try{return JSON.parse(localStorage.getItem('ipf_'+k))??d}catch{return d}},set(k,v){localStorage.setItem('ipf_'+k,JSON.stringify(v))}};
    const schedules=[['Domingo','09h00','Culto de Adoração'],['Domingo','10h15','Escola Bíblica Dominical'],['Domingo','18h30','Culto Vespertino'],['Terça','19h00','Culto de Oração'],['Quinta','19h00','Estudo Bíblico'],['Sábado','08h00','Consagração']];
    const actions=[['💬','Fale com o Pastor','pastor'],['🛡️','Conselho','council'],['🤲','Pedido de Oração','prayer'],['📖','Devocional','devotional'],['📅','Agenda','agenda'],['🔔','Avisos','notices'],['🎁','Dízimos e Ofertas','offering'],['🎂','Aniversariantes','birthdays'],['🖼️','Aconteceu e Foi Bom','gallery'],['✨','Ação Social','social'],['👥','Sociedades','community'],['📍','Como chegar','location']];
    const societies=[['SAF','Sociedade Auxiliadora Feminina'],['UPH','União Presbiteriana de Homens'],['UMP','União de Mocidade Presbiteriana'],['UPA','União Presbiteriana de Adolescentes'],['UCP','União de Crianças Presbiterianas']];
    let state={user:store.get('user',null),tab:'home',detail:null,admin:false};
    const app=$('#app');
    function brand(){return '<div class="brand"><div class="logo">✝</div><div><small>IGREJA PRESBITERIANA</small><strong>Filadélfia</strong></div></div>'}
    function auth(){app.className='';app.innerHTML=`<main class="auth"><section class="auth-top gradient">${brand()}<h1>Uma igreja conectada para servir e caminhar junta.</h1><p>Entre para acompanhar cultos, avisos, oração, sociedades e nossa biblioteca.</p></section><section class="auth-card"><div class="tabs"><button class="active" data-mode="signup">Criar cadastro</button><button data-mode="login">Já tenho acesso</button></div><form id="authForm" class="form" style="margin-top:18px"><div class="field"><label>E-mail</label><input id="email" type="email" required placeholder="seu@email.com"></div><div class="field"><label>Senha</label><input id="pass" type="password" minlength="8" required placeholder="Mínimo de 8 caracteres"></div><button class="btn full">Continuar</button></form><button class="admin-toggle" id="adminToggle">🛡 Entrar como administrador</button><p class="auth-note">🔒 Seus dados ficam salvos somente neste navegador nesta versão portátil.</p></section></main>`;
      let mode='signup';document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));$('#email').readOnly=false;$('#email').value=''});
      $('#adminToggle').onclick=()=>{mode='admin';$('#email').value='adm_filadelfiaconecta@gmail.com';$('#email').readOnly=true;$('#pass').focus()};
      $('#authForm').onsubmit=e=>{e.preventDefault();const email=$('#email').value.trim(),name=email.split('@')[0].replace(/[._-]/g,' ');state.user={email,name:name.replace(/\b\w/g,c=>c.toUpperCase())||'Membro'};state.admin=mode==='admin'&&email.toLowerCase()==='adm_filadelfiaconecta@gmail.com';store.set('user',state.user);store.set('admin',state.admin);render()};
    }
    function nav(){return `<nav class="nav">${[['🏠','home','Início'],['⛪','cultos','Cultos'],['👥','community','Comunidade'],['📚','library','Livros'],['☰','more','Mais']].map(([i,id,l])=>`<button data-tab="${id}" class="${state.tab===id?'active':''}"><span>${i}</span><span>${l}</span></button>`).join('')}</nav>`}
    function shell(body,title){app.className=state.admin?'admin':'';app.innerHTML=`<main class="shell"><header class="header gradient"><div class="wrap"><div class="topline">${brand()}<button class="btn ghost iconbtn" id="logout" title="Sair">↪</button></div><div class="greeting"><p>${state.tab==='home'?'Olá, '+esc(state.user.name.split(' ')[0]):''}</p><h1>${title}</h1></div></div></header><div class="wrap">${body}</div>${nav()}<button class="btn admin-only admin-edit" data-detail="admin">✎ Editar</button></main>`;bind()}
    function home(){const notices=store.get('notices',[]);return `<div class="content"><section class="hero"><div class="eyebrow">Próximo culto</div><div class="hero-row"><div><h2>Culto de Adoração</h2><div>Domingo · 09h00</div></div><button class="btn secondary small" data-tab="cultos">Ver cultos</button></div></section><h2 class="section-title">Acesso rápido</h2><div class="grid">${actions.map(([i,l,d])=>`<button class="quick" ${d==='community'?'data-tab="community"':`data-detail="${d}"`}><span class="ico">${i}</span><span>${l}</span></button>`).join('')}</div><h2 class="section-title">Avisos recentes</h2><div class="stack">${notices.length?notices.slice(-2).reverse().map(n=>`<article class="card"><h3>${esc(n.title)}</h3><p class="muted">${esc(n.body)}</p></article>`).join(''):'<div class="notice">Nenhum aviso publicado no momento.</div>'}</div></div>`}
    function cultos(){return `<div class="content stack">${schedules.map((s,i)=>`<article class="card row"><div class="time">${s[1]}</div><div class="grow"><div class="eyebrow muted">${s[0]}</div><strong>${s[2]}</strong></div>${i===0?'<span class="badge">PRÓXIMO</span>':''}</article>`).join('')}<div class="grid"><a class="btn outline" href="https://www.google.com/maps/search/?api=1&query=Rua+Vicente+de+Lima+Cleto+250+São+Gonçalo+RJ" target="_blank">📍 Como chegar</a><a class="btn" href="https://www.youtube.com/@IPBFilad%C3%A9lfiaems%C3%A3ogon%C3%A7alo/streams" target="_blank">▶ Culto online</a></div></div>`}
    function community(){return `<div class="content"><p class="muted">Conheça as sociedades e ministérios da igreja.</p><div class="stack">${societies.map(s=>`<article class="card row"><div class="time">${s[0]}</div><div class="grow"><strong>${s[1]}</strong><div class="tiny muted">Link do grupo pendente</div></div><span>›</span></article>`).join('')}</div></div>`}
    function library(){const books=[['Catecismo Maior de Westminster','Assembleia de Westminster'],['Breve Catecismo de Westminster','Assembleia de Westminster'],['As Institutas da Religião Cristã','João Calvino']];return `<div class="content stack">${books.map(b=>`<article class="card row"><div class="time">📖</div><div class="grow"><strong>${b[0]}</strong><div class="tiny muted">${b[1]}</div></div><span>↓</span></article>`).join('')}<p class="tiny muted">Esta versão portátil não incorpora PDFs externos.</p></div>`}
    function more(){return `<div class="content stack"><button class="card row" data-detail="pastor"><span>💬</span><strong class="grow">Fale com o Pastor</strong><span>›</span></button><button class="card row" data-detail="offering"><span>🤲</span><strong class="grow">Contribuições</strong><span>›</span></button><button class="card row" data-detail="location"><span>📍</span><strong class="grow">Como chegar</strong><span>›</span></button>${state.admin?'<button class="card row" data-detail="admin"><span>🛡</span><strong class="grow">Central Administrativa</strong><span>›</span></button>':''}<button class="card row" id="logout2"><span>↪</span><strong>Sair</strong></button></div>`}
    function detail(title,body){app.className=state.admin?'admin':'';app.innerHTML=`<main class="shell"><header class="view-head gradient"><div class="wrap"><button class="back" id="back">← Voltar</button><h1>${title}</h1></div></header><div class="wrap">${body}</div><button class="btn admin-only admin-edit" data-detail="admin">✎ Editar esta área</button></main>`;$('#back').onclick=()=>{state.detail=null;render()};bind()}
    function simpleCards(key,empty){const list=store.get(key,[]);return `<div class="content stack">${list.length?list.slice().reverse().map(x=>`<article class="card"><h2>${esc(x.title)}</h2><p class="muted">${esc(x.body)}</p></article>`).join(''):`<div class="notice">${empty}</div>`}</div>`}
    function gallery(){const photos=store.get('photos',[]);detail('Aconteceu e Foi Bom',`<div class="content"><div class="notice warning"><strong>Responsabilidade no envio.</strong> Publique somente fotos de atividades da igreja com autorização das pessoas retratadas. Seu nome ficará visível.</div><form id="photoForm" class="form card" style="margin:18px 0"><h2>Adicionar ao álbum</h2><div class="field"><label>Foto</label><input id="photoFile" type="file" accept="image/*" required></div><div class="field"><label>Legenda</label><textarea id="caption" minlength="3" maxlength="500" required></textarea></div><label class="tiny"><input id="accept" type="checkbox" required> Confirmo que tenho autorização para publicar.</label><button class="btn">Publicar foto agora</button></form><div class="gallery">${photos.map((p,i)=>`<figure class="card photo"><img src="${p.data}" alt="${esc(p.caption)}"><figcaption><strong>${esc(p.caption)}</strong><div class="tiny muted">Publicado por ${esc(p.name)}</div><button class="btn danger small" data-delphoto="${i}">Excluir</button></figcaption></figure>`).join('')}</div></div>`);
      $('#photoForm').onsubmit=e=>{e.preventDefault();const f=$('#photoFile').files[0];if(!f||f.size>2*1024*1024)return alert('Escolha uma imagem de até 2 MB para armazenamento local.');const r=new FileReader;r.onload=()=>{const a=store.get('photos',[]);a.unshift({data:r.result,caption:$('#caption').value.trim(),name:state.user.name});store.set('photos',a);gallery()};r.readAsDataURL(f)};document.querySelectorAll('[data-delphoto]').forEach(b=>b.onclick=()=>{const a=store.get('photos',[]);a.splice(+b.dataset.delphoto,1);store.set('photos',a);gallery()})}
    function prayer(){const prayers=store.get('prayers',[]);detail('Pedidos de Oração',`<div class="content"><blockquote class="notice">“Em tudo sejam os vossos pedidos conhecidos diante de Deus.”<br><strong>Filipenses 4:6</strong></blockquote><form id="prayerForm" class="form" style="margin:20px 0"><div class="field"><label>Assunto</label><input id="subject" minlength="3" required></div><div class="field"><label>Seu pedido</label><textarea id="request" minlength="5" required></textarea></div><label class="tiny"><input id="publicPrayer" type="checkbox" checked> Mostrar no mural público</label><button class="btn full">🤲 Enviar pedido de oração</button></form><h2>Pedidos públicos</h2><div class="stack">${prayers.map(p=>`<article class="card"><span class="badge">🙏 Orando</span><h3>${esc(p.subject)}</h3><p>${esc(p.text)}</p><small class="muted">${esc(p.name)}</small></article>`).join('')||'<div class="notice">Ainda não há pedidos públicos.</div>'}</div></div>`);$('#prayerForm').onsubmit=e=>{e.preventDefault();if($('#publicPrayer').checked){const a=store.get('prayers',[]);a.unshift({subject:$('#subject').value,text:$('#request').value,name:state.user.name});store.set('prayers',a)}alert('Pedido registrado neste navegador.');prayer()}}
    function admin(){detail('Central Administrativa',`<div class="content stack"><section class="card"><h2>Publicar informação</h2><form id="contentForm" class="form"><div class="field"><label>Área</label><select id="ctype"><option value="notices">Aviso</option><option value="agenda">Agenda</option></select></div><div class="field"><label>Título</label><input id="ctitle" required></div><div class="field"><label>Informação</label><textarea id="cbody" required></textarea></div><button class="btn">＋ Publicar</button></form></section><section class="card"><h2>Modo administrador</h2><p class="muted">Nesta edição HTML portátil, as alterações ficam guardadas apenas no navegador atual.</p><button id="clearData" class="btn danger">Limpar dados locais</button></section></div>`);$('#contentForm').onsubmit=e=>{e.preventDefault();const k=$('#ctype').value,a=store.get(k,[]);a.push({title:$('#ctitle').value,body:$('#cbody').value});store.set(k,a);alert('Conteúdo publicado localmente.');admin()};$('#clearData').onclick=()=>{if(confirm('Apagar fotos, pedidos e publicações locais?')){['photos','prayers','notices','agenda'].forEach(k=>localStorage.removeItem('ipf_'+k));admin()}}}
    function routeDetail(){const d=state.detail;if(d==='gallery')return gallery();if(d==='prayer')return prayer();if(d==='admin')return admin();const map={pastor:['Fale com o Pastor',`<div class="content"><section class="card"><div class="avatar">💬</div><h2>Rev. Rafael</h2><p class="muted">Converse com o pastor para aconselhamento, cuidado espiritual ou oração.</p><a class="btn full" target="_blank" href="https://wa.me/5521987361216">Abrir conversa no WhatsApp</a></section></div>`],council:['Fale com o Conselho',`<div class="content"><section class="card"><div class="avatar">🏛️</div><h2>Canal Direto e Reservado</h2><p class="muted">Envie sua mensagem ao Pastor e aos Presbíteros do Conselho.</p><a class="btn full" target="_blank" href="https://wa.me/5521987361216">Conversar pelo WhatsApp</a></section></div>`],devotional:['Devocional do Dia',`<div class="content"><article class="card"><span class="badge">PALAVRA DO DIA</span><h2>Permanecei firmes na esperança</h2><blockquote>“Alegrai-vos na esperança, sede pacientes na tribulação, perseverai na oração.” — Romanos 12:12</blockquote><p class="muted">Que hoje nossa fé seja fortalecida pelo cuidado e pela fidelidade de Deus.</p></article></div>`],offering:['Dízimos e Ofertas',`<div class="content"><section class="hero"><h2>Contribua com alegria</h2><p>Dízimos e ofertas sustentam a missão, o cuidado e os projetos da igreja.</p></section><section class="card" style="margin-top:16px"><h2>Informações para contribuição</h2><p class="muted">Solicite a chave PIX e os dados atualizados à tesouraria.</p><a class="btn full" target="_blank" href="https://wa.me/5521987361216">Solicitar dados</a></section></div>`],birthdays:['Aniversariantes','<div class="content"><div class="notice">Nenhum aniversariante cadastrado neste mês nesta versão portátil.</div></div>'],social:['Ação Social',`<div class="content"><article class="card"><span class="badge">PROJETO EM DESTAQUE</span><h2>Talentos do Reino</h2><p class="muted">Curso de costura e modelagem para iniciantes, com proposta evangelística, social e de inserção no mercado de trabalho.</p><div class="notice warning"><strong>Mais informações:</strong> terça-feira, às 17h, na igreja.</div></article></div>`],location:['Como chegar',`<div class="content"><section class="card"><div class="avatar">📍</div><h2>Rua Vicente de Lima Cleto, 250</h2><p class="muted">Nova Cidade · São Gonçalo, RJ</p><a class="btn full" target="_blank" href="https://www.google.com/maps/search/?api=1&query=Rua+Vicente+de+Lima+Cleto+250+São+Gonçalo+RJ">Abrir no mapa</a></section></div>`]};if(d==='agenda')return detail('Agenda',simpleCards('agenda','Nenhum evento publicado no momento.'));if(d==='notices')return detail('Avisos',simpleCards('notices','Nenhum aviso publicado no momento.'));const m=map[d]||['Filadélfia Conecta',''];detail(m[0],m[1])}
    function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.detail=null;render()});document.querySelectorAll('[data-detail]').forEach(b=>b.onclick=()=>{state.detail=b.dataset.detail;routeDetail()});const out=()=>{localStorage.removeItem('ipf_user');localStorage.removeItem('ipf_admin');state.user=null;state.admin=false;auth()};if($('#logout'))$('#logout').onclick=out;if($('#logout2'))$('#logout2').onclick=out}
    function render(){if(!state.user)return auth();state.admin=store.get('admin',false);if(state.detail)return routeDetail();const views={home:[home(),'Paz seja com você.'],cultos:[cultos(),'Cultos'],community:[community(),'Comunidade'],library:[library(),'Biblioteca'],more:[more(),'Mais']};shell(views[state.tab][0],views[state.tab][1])}
    render();
  })();
  </script>
</body>
</html>
